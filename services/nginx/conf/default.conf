server {
	listen 7999 ssl;

	server_name localhost;

	ssl_certificate /etc/ssl/certs/transcendence.crt;
	ssl_certificate_key /etc/ssl/private/transcendence.key;	
	
	ssl_protocols TLSv1.3;

	# FRONTEND (React)
	location / {
		# To change the URI sended to the frontend container
		proxy_pass http://frontend:5173;

		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Location for oauth (Logins with external accounts like Google)
	location ~ ^/oauth-redirect/ {
		proxy_pass http://frontend:5173;
		
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# BACKEND (Laravel)
	location ~ ^/(api|broadcasting|sanctum|login|register|logout|v1|oauth|two-factor-challenge|user|media) {
		# To change the URI sended to the laravel container
		fastcgi_pass laravel:9000;

		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
		fastcgi_param DOCUMENT_ROOT /var/www/public;

		# Evita timeouts en la autenticación de canales y peticiones largas
		fastcgi_read_timeout 300;
		fastcgi_connect_timeout 300;
		fastcgi_send_timeout 300;

		fastcgi_param REQUEST_URI $request_uri;
		fastcgi_param HTTPS on;
		fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
	}

	# WEBSOCKETS (Reverb)
	location /app/ {
		# To change the URI sended to the reverb container
		proxy_pass http://reverb:6001;

		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "Upgrade";

		proxy_buffering off;
		proxy_cache off;
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;
		proxy_connect_timeout 300s;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /game/ {
		proxy_pass http://game:80/;

		proxy_http_version 1.1;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /adminer/ {
		# To change the URI sended to the adminer container
		proxy_pass http://adminer:8080/;
		
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Change cookie path to make login work with the subroute
		proxy_cookie_path / /adminer;
	}
}